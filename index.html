<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Scientific Calculator</title>
    <style>
        :root {
            --bg: #000000;
            --card: #0a0e14;
            --blue: #00b7ff;
            --orange: #ff9800;
            --btn-dark: #1c1c1e;
            --btn-light: #2c2c2e;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 70px;
        }

        .container {
            width: 100%;
            max-width: 430px;
            background: var(--card);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid #1f293d;
        }

        .display {
            padding: 20px 10px;
            text-align: right;
            margin-bottom: 20px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            word-wrap: break-word;
            word-break: break-all;
        }

        #preview {
            color: var(--text-dim);
            font-size: 1.2rem;
            margin-bottom: 5px;
            min-height: 1.5rem;
        }

        #expression {
            font-size: 2.8rem;
            font-weight: 300;
            overflow-x: auto;
            white-space: nowrap;
        }

        .mode-selector {
            display: flex;
            background: #121824;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
            border: 1px solid #1f293d;
        }

        .mode-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: var(--blue);
            color: #000;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .grid.sci-mode {
            grid-template-columns: repeat(5, 1fr);
        }

        button {
            border: none;
            background: var(--btn-dark);
            color: var(--text-main);
            font-size: 1.4rem;
            padding: 15px 0;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        button.operator { color: var(--blue); background: #12253a; }
        button.action { color: #ff453a; background: #2c1616; }
        button.equal { background: var(--orange); color: #000; font-weight: bold; }
        button.sci { background: #1a1a2e; color: var(--blue); font-size: 1rem; }

        .hidden { display: none !important; }

        .history-panel {
            background: rgba(10,14,20,0.95);
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 70px;
            z-index: 100;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            display: flex;
            flex-direction: column;
        }

        .history-panel.open { transform: translateY(0); }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .history-list { flex: 1; overflow-y: auto; }
        .history-item { padding: 12px 0; border-bottom: 1px solid #1f293d; text-align: right; }
        .hist-expr { color: var(--text-dim); font-size: 1rem; }
        .hist-res { color: var(--orange); font-size: 1.3rem; font-weight: bold; }

        .admob {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            height: 70px;
            background: #000;
            border-top: 1px solid #1c1c1e;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="mode-selector">
            <button class="mode-btn active" onclick="switchMode('norm')">Standard</button>
            <button class="mode-btn" onclick="switchMode('sci')">Scientific</button>
            <button class="mode-btn" onclick="toggleHistory()">History</button>
        </div>

        <div class="display">
            <div id="preview"></div>
            <div id="expression">0</div>
        </div>

        <div id="keypad" class="grid">
            <button class="action" onclick="clearAll()">AC</button>
            <button class="action" onclick="backspace()">⌫</button>
            <button class="operator" onclick="inputOperator('%')">%</button>
            <button class="operator" onclick="inputOperator('/')">÷</button>

            <button class="sci hidden" onclick="inputFunction('sin')">sin</button>
            <button class="sci hidden" onclick="inputFunction('cos')">cos</button>
            <button class="sci hidden" onclick="inputFunction('tan')">tan</button>
            <button class="sci hidden" onclick="inputFunction('sinh')">sinh</button>
            <button class="sci hidden" onclick="inputFunction('cosh')">cosh</button>
            <button class="sci hidden" onclick="inputFunction('tanh')">tanh</button>
            <button class="sci hidden" onclick="inputFunction('sqrt')">√</button>
            <button class="sci hidden" onclick="inputFunction('log')">log</button>
            <button class="sci hidden" onclick="inputFunction('ln')">ln</button>
            <button class="sci hidden" onclick="inputOperator('^')">xʸ</button>
            <button class="sci hidden" onclick="runSpecial('square')">x²</button>
            <button class="sci hidden" onclick="runSpecial('cube')">x³</button>
            <button class="sci hidden" onclick="runSpecial('factorial')">x!</button>
            <button class="sci hidden" onclick="runSpecial('inverse')">1/x</button>
            <button class="sci hidden" onclick="runSpecial('rand')">Rand</button>
            <button class="sci hidden" onclick="runSpecial('eng')">ENG</button>

            <button onclick="inputDigit('7')">7</button>
            <button onclick="inputDigit('8')">8</button>
            <button onclick="inputDigit('9')">9</button>
            <button class="operator" onclick="inputOperator('*')">×</button>

            <button onclick="inputDigit('4')">4</button>
            <button onclick="inputDigit('5')">5</button>
            <button onclick="inputDigit('6')">6</button>
            <button class="operator" onclick="inputOperator('-')">−</button>

            <button onclick="inputDigit('1')">1</button>
            <button onclick="inputDigit('2')">2</button>
            <button onclick="inputDigit('3')">3</button>
            <button class="operator" onclick="inputOperator('+')">+</button>

            <button onclick="inputDigit('0')">0</button>
            <button onclick="inputDigit('.')">.</button>
            <button class="operator" onclick="inputBracket('(')">(</button>
            <button class="operator" onclick="inputBracket(')')">)</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <div id="historyPanel" class="history-panel">
        <div class="history-header">
            <h2>History</h2>
            <button class="action" style="padding: 5px 15px; font-size: 1rem;" onclick="clearHistory()">Clear</button>
        </div>
        <div id="historyList" class="history-list"></div>
    </div>

    <div class="admob">
        <span style="color: #444; font-size: 0.9rem;">Google AdMob Banner Space</span>
    </div>

<script>
    const exprDiv = document.getElementById("expression");
    const previewDiv = document.getElementById("preview");
    const keypad = document.getElementById("keypad");
    const historyPanel = document.getElementById("historyPanel");
    const historyList = document.getElementById("historyList");

    let isSciMode = false;

    function switchMode(mode) {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        if(mode === 'sci') {
            isSciMode = true;
            document.querySelectorAll('.mode-btn')[1].classList.add('active');
            keypad.classList.add('sci-mode');
            document.querySelectorAll('.sci').forEach(b => b.classList.remove('hidden'));
        } else if(mode === 'norm') {
            isSciMode = false;
            document.querySelectorAll('.mode-btn')[0].classList.add('active');
            keypad.classList.remove('sci-mode');
            document.querySelectorAll('.sci').forEach(b => b.classList.add('hidden'));
        }
    }

    function toggleHistory() {
        historyPanel.classList.toggle('open');
        if(historyPanel.classList.contains('open')) {
            renderHistory();
        }
    }

    function inputDigit(val) {
        if (exprDiv.innerText === "0" && val !== ".") {
            exprDiv.innerText = val;
        } else {
            exprDiv.innerText += val;
        }
        updateLivePreview();
    }

    function inputOperator(op) {
        let current = exprDiv.innerText;
        let lastChar = current.slice(-1);
        if(["+", "-", "*", "/", "%", "^"].includes(lastChar)) {
            exprDiv.innerText = current.slice(0, -1) + op;
        } else {
            exprDiv.innerText += op;
        }
    }

    function inputBracket(br) {
        if(exprDiv.innerText === "0") {
            exprDiv.innerText = br;
        } else {
            exprDiv.innerText += br;
        }
    }

    // Prefixed Function Text Handler
    function inputFunction(funcName) {
        if (exprDiv.innerText === "0") {
            exprDiv.innerText = funcName + "(";
        } else {
            let lastChar = exprDiv.innerText.slice(-1);
            if(["+", "-", "*", "/", "("].includes(lastChar)) {
                exprDiv.innerText += funcName + "(";
            } else {
                exprDiv.innerText += "*" + funcName + "(";
            }
        }
        updateLivePreview();
    }

    // Instant/Special Math Logic Buttons
    function runSpecial(type) {
        try {
            let currentVal = eval(parseExpression(exprDiv.innerText));
            if(currentVal === undefined || isNaN(currentVal)) return;
            let output = 0;

            switch(type) {
                case 'square': output = Math.pow(currentVal, 2); break;
                case 'cube': output = Math.pow(currentVal, 3); break;
                case 'inverse': output = 1 / currentVal; break;
                case 'rand': output = Math.random(); break;
                case 'eng': output = currentVal.toExponential(4); break;
                case 'factorial':
                    if (currentVal < 0) { output = "Error"; break; }
                    let fact = 1;
                    for (let i = 1; i <= currentVal; i++) fact *= i;
                    output = fact;
                    break;
            }
            exprDiv.innerText = output;
            previewDiv.innerText = "";
        } catch(e) {
            exprDiv.innerText = "Error";
        }
    }

    function clearAll() {
        exprDiv.innerText = "0";
        previewDiv.innerText = "";
    }

    function backspace() {
        let current = exprDiv.innerText;
        if(current.length <= 1 || current === "0") {
            exprDiv.innerText = "0";
        } else {
            if(current.endsWith("sinh(") || current.endsWith("cosh(") || current.endsWith("tanh(")) {
                exprDiv.innerText = current.slice(0, -5) || "0";
            } else if(current.endsWith("sin(") || current.endsWith("cos(") || current.endsWith("tan(") || current.endsWith("sqrt(")) {
                exprDiv.innerText = current.slice(0, -4) || "0";
            } else if(current.endsWith("log(") || current.endsWith("txt(")) {
                exprDiv.innerText = current.slice(0, -4) || "0";
            } else if(current.endsWith("ln(")) {
                exprDiv.innerText = current.slice(0, -3) || "0";
            } else {
                exprDiv.innerText = current.slice(0, -1);
            }
        }
        updateLivePreview();
    }

    function updateLivePreview() {
        try {
            let raw = exprDiv.innerText;
            if(raw === "0" || raw === "") { previewDiv.innerText = ""; return; }
            let formatted = parseExpression(raw);
            let res = eval(formatted);
            if(res !== undefined && !isNaN(res)) {
                previewDiv.innerText = Number.isInteger(res) ? res : parseFloat(res.toFixed(6));
            }
        } catch(e) {
            previewDiv.innerText = "";
        }
    }

    function parseExpression(str) {
        let clean = str.replace(/÷/g, "/").replace(/×/g, "*").replace(/−/g, "-");
        let openB = (clean.match(/\(/g) || []).length;
        let closeB = (clean.match(/\)/g) || []).length;
        while(openB > closeB) { clean += ")"; closeB++; }

        // Degree configuration maps
        clean = clean.replace(/sin\(/g, "Math.sin(" + Math.PI + "/180*");
        clean = clean.replace(/cos\(/g, "Math.cos(" + Math.PI + "/180*");
        clean = clean.replace(/tan\(/g, "Math.tan(" + Math.PI + "/180*");
        
        // Advanced formula updates
        clean = clean.replace(/sinh\(/g, "Math.sinh(");
        clean = clean.replace(/cosh\(/g, "Math.cosh(");
        clean = clean.replace(/tanh\(/g, "Math.tanh(");
        clean = clean.replace(/sqrt\(/g, "Math.sqrt(");
        clean = clean.replace(/log\(/g, "Math.log10(");
        clean = clean.replace(/ln\(/g, "Math.log(");
        
        if(clean.includes("^")) {
            let parts = clean.split("^");
            clean = `Math.pow(${parts[0]},${parts[1]})`;
        }
        return clean;
    }

    function calculate() {
        try {
            let originalExpr = exprDiv.innerText;
            if(originalExpr === "0") return;
            
            let formatted = parseExpression(originalExpr);
            let result = eval(formatted);
            
            if(result === undefined || isNaN(result)) throw new Error();
            
            if (!Number.isInteger(result)) {
                result = parseFloat(result.toFixed(8));
            }
            
            saveToHistory(originalExpr, result);
            exprDiv.innerText = result;
            previewDiv.innerText = "";
        } catch (error) {
            exprDiv.innerText = "Error";
            previewDiv.innerText = "";
            setTimeout(() => { exprDiv.innerText = "0"; }, 1500);
        }
    }

    function saveToHistory(expr, res) {
        let history = JSON.parse(localStorage.getItem("fluxaaCalc_hist") || "[]");
        history.unshift({ expr, res });
        if(history.length > 20) history.pop();
        localStorage.setItem("fluxaaCalc_hist", JSON.stringify(history));
    }

    function renderHistory() {
        let history = JSON.parse(localStorage.getItem("fluxaaCalc_hist") || "[]");
        if(history.length === 0) {
            historyList.innerHTML = "<p style='text-align:center;color:var(--text-dim);margin-top:20px;'>No history yet</p>";
            return;
        }
        historyList.innerHTML = history.map(item => `
            <div class="history-item">
                <div class="hist-expr">${item.expr}</div>
                <div class="hist-res">${item.res}</div>
            </div>
        `).join("");
    }

    function clearHistory() {
        localStorage.removeItem("fluxaaCalc_hist");
        renderHistory();
    }
</script>
</body>
</html>
